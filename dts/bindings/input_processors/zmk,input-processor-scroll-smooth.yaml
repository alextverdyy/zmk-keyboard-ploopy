description: |
  Scroll smoothing input processor for trackball/trackpoint scroll chains.

  Provides three filter stages, applied in order:

    1. DEADZONE  — any absolute delta below `deadzone` is zeroed (removed).
       Prevents tiny sensor jitter from entering the scroll chain.
       Deadzone zero-out does NOT freeze the EMA velocity — internal
       velocity decays toward zero via the alpha coefficient, so a
       micro-pause doesn't cause a velocity overshoot when the user
       resumes scrolling.

    2. EMA LOW-PASS  — exponential moving average on the per-axis delta.
         vel = (delta × alpha + vel × (1000 − alpha)) / 1000
       alpha is in permille: 1000 = passthrough (no smoothing),
       500 = 50% history / 50% new, 100 = very smooth.
       The EMA runs on both axes independently so a fast X flick and
       a slow Y pan each get appropriate smoothing.

    3. ADAPTIVE GAIN  — scale the smoothed output by a velocity-dependent
       factor.  The gain transitions linearly between gain-min and
       gain-max as |vel| rises from gain-threshold to 2× gain-threshold.
         |vel| ≤ threshold    → gain = gain-min
         threshold < |vel| < 2×threshold  → linear interpolation
         |vel| ≥ 2×threshold  → gain = gain-max
       This gives precise low-speed control (gain-min < 1000 slows the
       cursor) and fast high-speed flicking (gain-max > 1000 boosts).

  Recommended placement in the scroller chain:

      zip_xy_transform (orientation)
      zip_xy_to_scroll_mapper
      scroll_smooth: scroll_smooth      ← THIS PROCESSOR
      scroll_inertia: scroll_inertia     ← downstream kinetic scroll

  The EMA here acts as a pre-filter for scroll_inertia's internal
  velocity tracking, smoothing out sensor jitter so the arming
  heuristics (deceleration detection, stop detection) trigger more
  consistently.

compatible: "zmk,input-processor-scroll-smooth"

include: ip_zero_param.yaml

properties:
  deadzone:
    type: int
    default: 0
    description: |
      Minimum absolute delta to pass through.  Values ≤ deadzone in
      magnitude are zeroed.  0 = disabled.

  alpha:
    type: int
    default: 500
    description: |
      EMA coefficient (permille).  1000 = passthrough, 0 = hold only
      (no new input accepted — useful for testing, not recommended
      for actual use).  Typical range [200 .. 800].
        PMW3360 at 900 CPI / 125 Hz:  alpha=300..500 recommended.

  gain-min:
    type: int
    default: 800
    description: |
      Minimum adaptive gain (permille) at or below gain-threshold.
      < 1000 = slow precise scrolls, > 1000 = fast but jittery.

  gain-max:
    type: int
    default: 1500
    description: |
      Maximum adaptive gain (permille) at or above 2× gain-threshold.

  gain-threshold:
    type: int
    default: 500
    description: |
      |vel| threshold where gain-min applies.  At twice this value
      gain-max is reached.  Units are scroll deltas per event
      (same as REL_WHEEL / REL_HWHEEL deltas), scaled by the EMA
      which operates on the same delta range.
