manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: george-norton
      url-base: https://github.com/george-norton
    - name: badjeff
      url-base: https://github.com/badjeff
    - name: nuovotaka
      url-base: https://github.com/nuovotaka
    - name: mjmjm0101
      url-base: https://github.com/mjmjm0101
    - name: cormoran
      url-base: https://github.com/cormoran
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-driver-pmw3360
      remote: george-norton
      revision: v0.3
    - name: zmk-behavior-sensor-attr-cycle
      remote: george-norton
      revision: v0.3
    - name: zmk-driver-rp2040-sleep
      remote: george-norton
      revision: v0.3
    - name: zmk-input-processor-report-rate-limit
      remote: badjeff
      revision: main
    - name: zmk-input-processor-xyz
      remote: badjeff
      revision: main
    # Replaces zmk-pointing-acceleration (oleksandrmaslov). Both modules
    # share the same `pointer_accel` node name and collide when fetched
    # together. Keep only this multi-level fork.
    - name: zmk-pointing-acceleration-alpha
      remote: nuovotaka
      revision: main
    # Scroll inertia: drop-in input processor. No auto-dtsi, so the
    # `&scroll_inertia` node is defined explicitly in ploopy_adept.keymap.
    - name: zmk-input-processor-scroll-inertia
      remote: mjmjm0101
      revision: main
    # Persistence backend for the runtime input processor module.
    # The runtime module itself requires cormoran's patched ZMK
    # (`zmk@cormoran/v0.3+custom-studio-protocol`) for the web-UI RPC.
    - name: zmk-feature-custom-settings
      remote: cormoran
      revision: main
    - name: zmk-module-runtime-input-processor
      remote: cormoran
      revision: main